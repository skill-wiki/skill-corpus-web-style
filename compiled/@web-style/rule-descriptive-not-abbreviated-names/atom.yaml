id: "@web-style/rule-descriptive-not-abbreviated-names"
kind: rule
version: "0.1.0"
description: "Identifier length follows information content. Use whole words that describe the role of the binding. Reserve single-letter names for canonical mathematical loop indices (`i`, `j`) or for ubiquitous higher-order callbacks (`(x) => x.id`). Avoid hand-rolled abbreviations — they save typing once and cost reading every time after."
domain: web-style
