id: "@web-style/rule-arrow-functions-for-callbacks"
kind: rule
version: "0.1.0"
description: "When the function is anonymous and passed inline as an argument or assigned to a binding, use an arrow function. Arrow functions inherit `this` from the enclosing scope, are terser, and signal \"this is not a method, just a value-returning expression\" at the call site."
