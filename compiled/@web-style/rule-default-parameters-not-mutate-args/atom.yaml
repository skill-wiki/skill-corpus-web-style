  core: "chunks/core.md"
  full: "chunks/full.md"
quality:
  overall: 4
relations:
  - { type: related, target: "@web-style/rule-arrow-functions-for-callbacks" }
  - { type: related, target: "@web-style/anti-pattern-reassign-parameters" }
