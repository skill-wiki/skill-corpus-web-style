  core: "chunks/core.md"
  full: "chunks/full.md"
quality:
  overall: 4
relations:
  - { type: related, target: "@web-style/rule-named-imports-stable-paths" }
  - { type: related, target: "@web-style/principle-clarity-over-cleverness" }
