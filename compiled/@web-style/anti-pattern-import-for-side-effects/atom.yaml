id: "@web-style/anti-pattern-import-for-side-effects"
kind: anti-pattern
version: "0.1.0"
description: "Writing `import './polyfills'` or `import 'register-handlers'` to trigger code execution at module load. The line has no value on the left of `from`, no symbols are bound, and the import is needed only because evaluating the file does work — registers a handler, patches a prototype, mutates a global."
domain: web-style
content_hash: "sha256:0c1d07b78a4689cca8bf059c7e1c2c43286bc7fb398ee66f28de206d1ecf9974"
tokens:
