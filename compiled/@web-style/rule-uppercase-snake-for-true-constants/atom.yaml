id: "@web-style/rule-uppercase-snake-for-true-constants"
kind: rule
version: "0.1.0"
description: "Reserve `UPPER_SNAKE_CASE` for top-level program-wide constants whose value is fixed for the lifetime of the program and is also a primitive or deeply frozen value. Not every `const` deserves UPPER_SNAKE_CASE — only the ones that act as named magic values."
domain: web-style
content_hash: "sha256:dccd51d52efea0d60ac9fdc0183098fa60cd4265bab5d074aa2079187aac1ae3"
tokens:
  summary: 81
  core: 205
  full: 225
projection:
  summary: "chunks/summary.md"
  core: "chunks/core.md"
  full: "chunks/full.md"
quality:
  overall: 4
relations:
  - { type: related, target: "@web-style/rule-camelcase-variables-and-functions" }
  - { type: related, target: "@web-style/rule-prefer-const-over-let" }
created_at: "2026-05-10"
