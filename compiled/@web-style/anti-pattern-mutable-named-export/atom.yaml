id: "@web-style/anti-pattern-mutable-named-export"
kind: anti-pattern
version: "0.1.0"
description: "Declaring `export let counter = 0` (or similar) and then reassigning it elsewhere in the module so importers' references update with each change. Ditto exporting an object whose properties are reassigned post-import as a way to push state across module boundaries."
