tokens:
  summary: 68
  core: 187
  full: 208
projection:
  summary: "chunks/summary.md"
  core: "chunks/core.md"
  full: "chunks/full.md"
quality:
  overall: 4
relations:
  - { type: related, target: "@web-style/rule-camelcase-variables-and-functions" }
  - { type: related, target: "@web-style/rule-uppercase-snake-for-true-constants" }
