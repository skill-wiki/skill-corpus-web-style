id: "@web-style/rule-pascalcase-classes-and-types"
kind: rule
version: "0.1.0"
description: "Names for things that produce instances or describe shapes — classes, constructor functions, TypeScript types, interfaces, and enum names — are written in `PascalCase`: every word capitalised including the first."
domain: web-style
